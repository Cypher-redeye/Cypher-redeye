### 2. 📊 GitHub Stats / Streak / Trophies — broken URLs

Replace the broken image URLs in your README with these corrected ones:

**GitHub Stats** — replace with:
```
https://github-readme-stats.vercel.app/api?username=Cypher-redeye&show_icons=true&theme=chartreuse-dark&hide_border=true&count_private=true
```

**GitHub Streak** — replace with:
```
https://streak-stats.demolab.com/?user=Cypher-redeye&theme=chartreuse-dark&hide_border=true
```
> The `nirzak-streak-stats` domain is sometimes unreliable — `demolab` is the official one.

**Top Languages** — replace with:
```
https://github-readme-stats.vercel.app/api/top-langs/?username=Cypher-redeye&layout=compact&theme=chartreuse-dark&hide_border=true
```

**Trophies** — replace with:
```
https://github-profile-trophy.vercel.app/?username=Cypher-redeye&theme=matrix&no-frame=true&no-bg=true&margin-w=6
```

**Visitor Count** — replace with:
```
https://komarev.com/ghpvc/?username=Cypher-redeye&color=00FF9C&style=flat-square&label=Profile+Views
